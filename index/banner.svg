<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 300" width="100%" height="auto" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bannerGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#003D99;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0066CC;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FF9500;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFB84D;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background gradient -->
  <rect width="1600" height="300" fill="url(#bannerGradient)"/>
  
  <!-- Decorative circles -->
  <circle cx="1400" cy="50" r="80" fill="#0052CC" opacity="0.2"/>
  <circle cx="200" cy="250" r="100" fill="#FF9500" opacity="0.15"/>
  <circle cx="1500" cy="200" r="60" fill="#0052CC" opacity="0.15"/>
  
  <!-- Trophy icon -->
  <g transform="translate(1250, 80)">
    <path d="M 20 5 L 20 15 Q 20 25 10 30 L 10 40 L 30 40 L 30 30 Q 20 25 20 15 L 20 5 M 5 10 L 35 10" 
          stroke="#FFD700" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="20" cy="25" r="6" fill="#FFD700"/>
  </g>
  
  <!-- Main title -->
  <text x="100" y="90" font-family="Arial, sans-serif" font-size="72" font-weight="bold" fill="white">
    Resume
  </text>
  <text x="100" y="90" font-family="Arial, sans-serif" font-size="72" font-weight="bold" fill="url(#accentGradient)" letters-spacing="0">
    Resume
  </text>
  
  <!-- Resume2Win with number styling -->
  <g>
    <text x="810" y="90" font-family="Arial, sans-serif" font-size="72" font-weight="bold" fill="url(#accentGradient)">2</text>
    <text x="880" y="90" font-family="Arial, sans-serif" font-size="72" font-weight="bold" fill="white">Win</text>
  </g>
  
  <!-- Tagline -->
  <text x="100" y="160" font-family="Arial, sans-serif" font-size="42" fill="white" font-weight="600">
    <tspan>Land the Job.</tspan>
    <tspan x="560" dy="0" fill="url(#accentGradient)">Win the Interview.</tspan>
  </text>
  
  <!-- Subtitle -->
  <text x="100" y="210" font-family="Arial, sans-serif" font-size="24" fill="#E6F0FF">
    Match your resume to job descriptions with AI-powered insights
  </text>
  
  <!-- Decorative line -->
  <line x1="100" y1="240" x2="300" y2="240" stroke="#FFB84D" stroke-width="4" stroke-linecap="round"/>
  
  <!-- Right side accent -->
  <g transform="translate(1350, 120)">
    <!-- Document -->
    <rect x="0" y="0" width="60" height="80" fill="none" stroke="white" stroke-width="3" rx="4" opacity="0.3"/>
    <line x1="8" y1="12" x2="52" y2="12" stroke="white" stroke-width="2" opacity="0.3"/>
    <line x1="8" y1="28" x2="52" y2="28" stroke="white" stroke-width="2" opacity="0.3"/>
    <line x1="8" y1="44" x2="40" y2="44" stroke="white" stroke-width="2" opacity="0.3"/>
  </g>
</svg>